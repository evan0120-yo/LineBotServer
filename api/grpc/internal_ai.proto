syntax = "proto3";

package internalaicopilot.integration.v1;

option go_package = "linebot-backend/internal/internalclient/pb;grpcpb";

import "google/protobuf/struct.proto";

service IntegrationService {
  rpc ListBuilders(ListBuildersRequest) returns (ListBuildersResponse);
  rpc Consult(ConsultRequest) returns (ConsultResponse);
  rpc ProfileConsult(ProfileConsultRequest) returns (ProfileConsultResponse);
  rpc LineTaskConsult(LineTaskConsultRequest) returns (LineTaskConsultResponse);
}

message ListBuildersRequest {
  string app_id = 1;
}

message ListBuildersResponse {
  repeated BuilderSummary builders = 1;
}

message BuilderSummary {
  int32 builder_id = 1;
  string builder_code = 2;
  optional string group_key = 3;
  string group_label = 4;
  string name = 5;
  string description = 6;
  bool include_file = 7;
  optional string default_output_format = 8;
}

message ConsultRequest {
  string app_id = 1;
  int32 builder_id = 2;
  string text = 3;
  string output_format = 4;
  repeated Attachment attachments = 5;
  string client_ip = 6;
}

message Attachment {
  string file_name = 1;
  string content_type = 2;
  bytes data = 3;
}

message ConsultResponse {
  bool status = 1;
  string status_ans = 2;
  string response = 3;
  FilePayload file = 4;
}

message ProfileConsultRequest {
  string app_id = 1;
  int32 builder_id = 2;
  SubjectProfile subject_profile = 4;
  string text = 5;
  string client_ip = 6;
  string user_text = 7;
  string intent_text = 8;
}

message SubjectProfile {
  string subject_id = 1;
  repeated SubjectAnalysisPayload analysis_payloads = 2;
}

message SubjectAnalysisPayload {
  string analysis_type = 1;
  optional string theory_version = 2;
  google.protobuf.Struct payload = 3;
}

message ProfileConsultResponse {
  bool status = 1;
  string status_ans = 2;
  string response = 3;
}

message LineTaskConsultRequest {
  string app_id = 1;
  int32 builder_id = 2;
  string message_text = 3;
  string reference_time = 4;
  string time_zone = 5;
  string client_ip = 6;
  repeated string supported_task_types = 7;
}

message LineTaskConsultResponse {
  string operation = 1;
  string summary = 2;
  string start_at = 3;
  string end_at = 4;
  string location = 5;
  repeated string missing_fields = 6;
  string task_type = 7;
  string event_id = 8;
  string query_start_at = 9;
  string query_end_at = 10;
}

message FilePayload {
  string file_name = 1;
  string content_type = 2;
  bytes data = 3;
}
